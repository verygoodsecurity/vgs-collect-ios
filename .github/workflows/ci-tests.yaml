name: ci tests

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
      
jobs:
  build-and-test-sdk:
    name: Build & Test SDK (iOS ${{ matrix.ios }}, Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      matrix:
        xcode: ['26.1.1']
        ios: ['26.1']
        device: ['iPhone 17']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          XCODE_PATH="/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Expected Xcode path not found: $XCODE_PATH"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: List installed runtimes & devices (debug)
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devices

      - name: Create and Boot Simulator
        run: |
          # Find or create the target simulator
          DEVICE_NAME="${{ matrix.device }}"
          IOS_VERSION="${{ matrix.ios }}"
          
          SIMULATOR_UDID=$(xcrun simctl list devices available | grep "$DEVICE_NAME" | grep -o '([A-F0-9-]*)\s*$' | tr -d '() ' | head -n 1 || echo "")
          
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "Creating new $DEVICE_NAME simulator with iOS $IOS_VERSION"
            SIMULATOR_UDID=$(xcrun simctl create "$DEVICE_NAME-Test" "com.apple.CoreSimulator.SimDeviceType.${DEVICE_NAME// /-}" "com.apple.CoreSimulator.SimRuntime.iOS-${IOS_VERSION//./-}")
          fi
          
          echo "Using simulator: $SIMULATOR_UDID"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> $GITHUB_ENV
          
          # Boot simulator
          xcrun simctl shutdown "$SIMULATOR_UDID" || true
          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          
          echo "Simulator booted successfully"

      - name: Install xcov
        run: gem install xcov

      - name: Configure Test Data
        env:
          TOKENIZATION_VAULT_ID: ${{ secrets.TOKENIZATION_VAULT_ID }}
          VAULT_ID: ${{ secrets.VAULT_ID }}
        working-directory: Tests/FrameworkTests/Resources
        run: |
          plutil -insert TOKENIZATION_VAULT_ID -string "${TOKENIZATION_VAULT_ID}" MockedData.plist
          plutil -insert VAULT_ID -string "${VAULT_ID}" MockedData.plist

      - name: Run Unit Tests
        run: |
          set -eo pipefail
          mkdir -p test-results
          xcodebuild \
            test \
            -project VGSCollectSDK.xcodeproj \
            -scheme FrameworkTests \
            -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -testPlan FrameworkTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log \
            | xcpretty --report junit --output test-results/junit.xml || true
          
          status=${PIPESTATUS[0]}
          echo "xcodebuild exit status: $status"
          exit $status

      - name: Upload Test Results
        if: always()
        id: sdk_upload_test_results
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results-xcode-${{ matrix.xcode }}
          path: test-results/
          if-no-files-found: warn

      - name: Warn if SDK Test Results Upload Failed
        if: always() && steps.sdk_upload_test_results.outcome != 'success'
        run: echo "::warning::SDK test-results artifact upload failed (non-blocking)."

      - name: Upload Xcodebuild Log
        if: always()
        id: sdk_upload_xcodebuild_log
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: xcodebuild-log-${{ matrix.xcode }}
          path: xcodebuild.log
          if-no-files-found: warn

      - name: Warn if SDK Xcodebuild Log Upload Failed
        if: always() && steps.sdk_upload_xcodebuild_log.outcome != 'success'
        run: echo "::warning::SDK xcodebuild.log artifact upload failed (non-blocking)."

  build-and-ui-test-demo-app:
    name: Build & UI Test Demo App (iOS ${{ matrix.ios }}, Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      matrix:
        xcode: ['26.1.1']
        ios: ['26.1']
        device: ['iPhone 17']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode ${{ matrix.xcode }}
        run: |
          XCODE_PATH="/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Expected Xcode path not found: $XCODE_PATH"
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi

          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Create and Boot Simulator
        run: |
          # Find or create the target simulator
          DEVICE_NAME="${{ matrix.device }}"
          IOS_VERSION="${{ matrix.ios }}"
          
          SIMULATOR_UDID=$(xcrun simctl list devices available | grep "$DEVICE_NAME" | grep -o '([A-F0-9-]*)\s*$' | tr -d '() ' | head -n 1 || echo "")
          
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "Creating new $DEVICE_NAME simulator with iOS $IOS_VERSION"
            SIMULATOR_UDID=$(xcrun simctl create "$DEVICE_NAME-Test" "com.apple.CoreSimulator.SimDeviceType.${DEVICE_NAME// /-}" "com.apple.CoreSimulator.SimRuntime.iOS-${IOS_VERSION//./-}")
          fi
          
          echo "Using simulator: $SIMULATOR_UDID"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> $GITHUB_ENV
          
          # Boot simulator
          xcrun simctl shutdown "$SIMULATOR_UDID" || true
          xcrun simctl boot "$SIMULATOR_UDID"
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

          echo "Simulator booted successfully"

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project demoapp/demoapp.xcodeproj \
            -scheme demoappUITests

      - name: Configure UI Test Data
        env:
          TOKENIZATION_VAULT_ID: ${{ secrets.TOKENIZATION_VAULT_ID }}
          VAULT_ID: ${{ secrets.VAULT_ID }}
        working-directory: demoapp/demoapp
        run: |
          plutil -insert VAULT_ID -string "${VAULT_ID}" UITestsMockedData.plist
          plutil -insert TOKENIZATION_VAULT_ID -string "${TOKENIZATION_VAULT_ID}" UITestsMockedData.plist

      - name: Run UI Tests
        run: |
          set -eo pipefail

          # Create isolated DerivedData to prevent permissions/cache issues
          mkdir -p demoapp/DerivedData test-results
          xcodebuild \
            test \
            -project demoapp/demoapp.xcodeproj \
            -scheme demoappUITests \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ env.SIMULATOR_UDID }}" \
            -parallel-testing-enabled NO \
            -derivedDataPath demoapp/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            | tee demoapp/xcodebuild.log \
            | xcpretty --report junit --output test-results/junit.xml
          
          status=${PIPESTATUS[0]}
          echo "xcodebuild exit status: $status"
          exit $status

      - name: Upload Test Results
        if: always()
        id: ui_upload_test_results
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ui-test-results-xcode-${{ matrix.xcode }}
          path: test-results/
          if-no-files-found: warn

      - name: Warn if UI Test Results Upload Failed
        if: always() && steps.ui_upload_test_results.outcome != 'success'
        run: echo "::warning::UI test-results artifact upload failed (non-blocking)."

      - name: Upload Xcodebuild Log
        if: always()
        id: ui_upload_xcodebuild_log
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: demoapp-ui-tests-log-xcode-${{ matrix.xcode }}
          path: demoapp/xcodebuild.log
          if-no-files-found: warn

      - name: Warn if UI Xcodebuild Log Upload Failed
        if: always() && steps.ui_upload_xcodebuild_log.outcome != 'success'
        run: echo "::warning::UI xcodebuild.log artifact upload failed (non-blocking)."
