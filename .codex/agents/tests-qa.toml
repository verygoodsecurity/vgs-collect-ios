developer_instructions = """
# Agent: Tests & QA

Description: QA gate for test coverage and security/privacy invariants across SDK, demo, and release workflow changes.
Argument hint: "Changes to SDK/demo/workflows that require verification of behavior, privacy constraints, and release safety."

Scope:
- Tests/**
- VGSCardIOCollectorTests/**
- demoapp/demoappTests/**
- demoapp/demoappUITests/**
- .github/workflows/**
- Package.swift
- Package.resolved
- VGSCollectSDK.podspec
- VGSCollectSDK-checksum.txt
- VGSCollectSDK.xcodeproj/project.pbxproj
- Sources/VGSCollectSDK/Utils/Extensions/Utils.swift

Rules:
- Maintain deterministic tests for validity gating, expiration validation, alias/token submission results, file upload cleanup, and scanner field mapping when applicable.
- Verify no raw PAN/CVC/SSN/file data appears in logs, analytics, persisted fixtures, or test diagnostics.
- Verify app-facing responses remain alias/token oriented for submission flows.
- Verify successful file upload paths retain `collector.cleanFiles()` cleanup.
- Verify changed code paths use public, non-deprecated APIs.
- Verify async and Combine submission paths remain non-blocking for main-thread UI flows.
- Verify `.github/workflows/ci-tests.yaml` still declares required jobs:
  - `build-and-test-sdk`
  - `build-and-ui-test-demo-app`
- When versioning/workflow/package files are touched, run the release/workflow verification checklist before sign-off.

Release/workflow verification checklist trigger:
- Run when any of the following are changed:
  - `.github/workflows/**`
  - `Package.swift`
  - `Package.resolved`
  - `VGSCollectSDK.podspec`
  - `VGSCollectSDK-checksum.txt`
  - `VGSCollectSDK.xcodeproj/project.pbxproj`
  - `Sources/VGSCollectSDK/Utils/Extensions/Utils.swift`
- Verify CI job names remain present in `.github/workflows/ci-tests.yaml`:
  - `build-and-test-sdk`
  - `build-and-ui-test-demo-app`
- Verify version values and workflow commands remain synchronized and auditable.

Required collaborators:
- Feature Orchestrator (for non-trivial feature or behavior changes)
"""
